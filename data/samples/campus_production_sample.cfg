!
hostname R1-Core
!
ip dhcp excluded-address 10.10.10.1 10.10.10.9
ip dhcp excluded-address 10.10.20.1 10.10.20.9
ip dhcp excluded-address 10.10.30.1 10.10.30.9
!
ip dhcp pool STAFF_POOL
 network 10.10.10.0 255.255.255.0
 default-router 10.10.10.1
 dns-server 8.8.8.8 1.1.1.1
 domain-name campus.local
!
ip dhcp pool STUDENT_POOL
 network 10.10.20.0 255.255.255.0
 default-router 10.10.20.1
 dns-server 8.8.8.8
!
ip dhcp pool GUEST_POOL
 network 10.10.30.0 255.255.255.0
 default-router 10.10.30.1
 dns-server 8.8.8.8
!
interface GigabitEthernet0/0
 description Uplink to SW1
 no shutdown
!
interface GigabitEthernet0/0.10
 description Staff gateway
 encapsulation dot1Q 10
 ip address 10.10.10.1 255.255.255.0
 ip nat inside
 ip access-group STAFF_POLICY in
!
interface GigabitEthernet0/0.20
 description Student gateway
 encapsulation dot1Q 20
 ip address 10.10.20.1 255.255.255.0
 ip nat inside
 ip access-group STUDENT_POLICY in
!
interface GigabitEthernet0/0.30
 description Guest gateway
 encapsulation dot1Q 30
 ip address 10.10.30.1 255.255.255.0
 ip nat inside
 ip access-group GUEST_ISOLATION in
!
interface GigabitEthernet0/1
 description Internet uplink
 ip address 203.0.113.2 255.255.255.252
 ip nat outside
!
ip access-list extended GUEST_ISOLATION
 10 deny ip 10.10.30.0 0.0.0.255 10.10.0.0 0.0.255.255
 20 permit ip 10.10.30.0 0.0.0.255 any
!
ip access-list extended STUDENT_POLICY
 10 deny ip 10.10.20.0 0.0.0.255 host 10.10.50.10
 20 permit ip 10.10.20.0 0.0.0.255 any
!
ip access-list extended STAFF_POLICY
 10 permit ip 10.10.10.0 0.0.0.255 any
!
ip route 0.0.0.0 0.0.0.0 203.0.113.1
ip nat inside source list STAFF_POLICY interface GigabitEthernet0/1 overload
!
hostname SW1-Access
!
vlan 10
 name STAFF
vlan 20
 name STUDENTS
vlan 30
 name GUESTS
!
interface GigabitEthernet0/1
 description Trunk to R1-Core
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
!
interface GigabitEthernet0/2
 description Trunk to AP-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
!
interface FastEthernet0/10
 description Staff wired test port
 switchport mode access
 switchport access vlan 10
!
Device ID: AP-01
Interface: GigabitEthernet0/2, Port ID (outgoing port): GigabitEthernet0
Platform: Cisco AP
