<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Accept Invite</title><link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="auth-body"><main class="auth-card"><h1>Accept WiGuard Invite</h1><p>Create your account using the invite token.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}{% endwith %}<form class="form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="token" value="{{ token }}" placeholder="Invite token" required><input name="username" placeholder="Username or email" required><input name="password" type="password" placeholder="Strong password" required><button class="primary-btn full" type="submit">Accept Invite</button></form><a href="{{ url_for('pages.login') }}">Back to login</a></main></body></html>
