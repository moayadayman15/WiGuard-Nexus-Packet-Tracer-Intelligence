<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Password Reset</title><link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="auth-body"><main class="auth-card"><h1>Reset Password</h1><p>Enter the reset token and a new strong password.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}{% endwith %}<form class="form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="token" value="{{ token }}" placeholder="Reset token" required><input name="new_password" type="password" placeholder="New strong password" required><button class="primary-btn full" type="submit">Reset Password</button></form><a href="{{ url_for('pages.login') }}">Back to login</a></main></body></html>
